name: focuslock
description: "FocusLock - Block distracting apps during focus sessions"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Background work
  workmanager: ^0.9.0+3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  shared_preferences: ^2.3.4

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.ico"
  adaptive_icon_foreground: "assets/app_icon.ico"
  adaptive_icon_background: "#0F0E2E"

flutter:
  uses-material-design: true

  assets:
    - assets/memes/
    - assets/memes/memes.json
    - assets/app_icon.ico
